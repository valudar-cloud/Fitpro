name: fitpro
description: Application de fitness personnalisée — FitPro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Backend ──────────────────────────────────────
  supabase_flutter: ^2.3.4

  # ── State Management ─────────────────────────────
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # ── Navigation ───────────────────────────────────
  go_router: ^13.2.0

  # ── Sécurité ─────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  flutter_dotenv: ^5.1.0

  # ── Paiements ────────────────────────────────────
  purchases_flutter: ^6.25.0
  flutter_stripe: ^9.4.0

  # ── UI ───────────────────────────────────────────
  cached_network_image: ^3.3.1
  gif_view: ^1.0.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  lottie: ^2.7.0
  flutter_animate: ^4.3.0

  # ── Utils ────────────────────────────────────────
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/gifs/
    - assets/lottie/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
